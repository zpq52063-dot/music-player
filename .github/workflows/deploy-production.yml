name: Deploy Production

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  safety-check:
    name: Production Safety Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify production configuration
        run: |
          echo "=== Production Safety Checks ==="

          # Check release mode
          RELEASE_MODE="${{ secrets.NEXT_PUBLIC_RELEASE_MODE }}"
          if [ "$RELEASE_MODE" != "release" ]; then
            echo "::error:: NEXT_PUBLIC_RELEASE_MODE must be 'release' for production, got: $RELEASE_MODE"
            exit 1
          fi
          echo "✓ Release mode: $RELEASE_MODE"

          # Check telemetry
          TELEMETRY="${{ secrets.NEXT_PUBLIC_TELEMETRY_ENABLED }}"
          if [ "$TELEMETRY" = "true" ]; then
            echo "::warning:: Telemetry is enabled in production"
          else
            echo "✓ Telemetry disabled"
          fi

          # Check debug overlay
          DEBUG="${{ secrets.NEXT_PUBLIC_DEBUG_OVERLAY }}"
          if [ "$DEBUG" = "true" ]; then
            echo "::error:: Debug overlay must be disabled in production"
            exit 1
          fi
          echo "✓ Debug overlay disabled"

          # Check site URL (warn only — non-blocking)
          SITE_URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}"
          if [ -n "$SITE_URL" ]; then
            if echo "$SITE_URL" | grep -q "pages.dev"; then
              echo "::warning:: Using .pages.dev in production — consider setting a custom domain"
            else
              echo "✓ Custom domain: $SITE_URL"
            fi
          else
            echo "::warning:: NEXT_PUBLIC_SITE_URL not set — will fall back to https://music-player.pages.dev"
          fi

          # Check worker URL (warn only — non-blocking)
          WORKER_URL="${{ secrets.NEXT_PUBLIC_CF_WORKER_URL }}"
          if [ -z "$WORKER_URL" ]; then
            echo "::warning:: NEXT_PUBLIC_CF_WORKER_URL not set — Remote Provider may be unavailable"
          else
            echo "✓ Worker URL: $WORKER_URL"
          fi

          echo "=== All safety checks passed ==="

  build-and-deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [safety-check]
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_RELEASE_MODE: release
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_CF_WORKER_URL: ${{ secrets.NEXT_PUBLIC_CF_WORKER_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_DEBUG_OVERLAY: "false"
          NEXT_PUBLIC_TELEMETRY_ENABLED: "false"

      - name: Build for Cloudflare Pages
        run: npm run cf:build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy .vercel/output/static --project-name=music-player --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-worker:
    name: Deploy Worker (Production)
    runs-on: ubuntu-latest
    needs: [safety-check]
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Deploy Worker
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
