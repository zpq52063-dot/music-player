name: Deploy Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  deploy-preview:
    name: Deploy to Cloudflare Pages (Preview)
    runs-on: ubuntu-latest
    needs: [validate]
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Create .env.preview
        run: |
          cat << 'EOF' > .env.preview
          NEXT_PUBLIC_RELEASE_MODE=internal
          NEXT_PUBLIC_SITE_URL=
          NEXT_PUBLIC_CF_WORKER_URL=${{ secrets.CF_WORKER_URL_PREVIEW }}
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_DEBUG_OVERLAY=false
          NEXT_PUBLIC_TELEMETRY_ENABLED=false
          EOF
        shell: bash

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_RELEASE_MODE: internal
          NEXT_PUBLIC_CF_WORKER_URL: ${{ secrets.CF_WORKER_URL_PREVIEW }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_DEBUG_OVERLAY: "false"
          NEXT_PUBLIC_TELEMETRY_ENABLED: "false"

      - name: Build for Cloudflare Pages
        run: npm run cf:build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=music-player --branch=${{ github.head_ref }}

      - name: Comment Preview URL
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            ## Preview Deployed

            Preview URL: https://${{ github.head_ref }}.music-player.pages.dev

            Worker: ${{ secrets.CF_WORKER_URL_PREVIEW }}/api/health
