name: Rollback

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to rollback"
        required: true
        type: choice
        options:
          - pages
          - worker
          - both
      environment:
        description: "Environment"
        required: true
        type: choice
        options:
          - production
          - preview
      deployment_id:
        description: "Deployment ID to rollback to (optional, defaults to previous)"
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rollback-pages:
    name: Rollback Cloudflare Pages
    if: ${{ github.event.inputs.target == 'pages' || github.event.inputs.target == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Rollback Pages Deployment
        run: |
          if [ -n "${{ github.event.inputs.deployment_id }}" ]; then
            npx wrangler pages deployment rollback --id=${{ github.event.inputs.deployment_id }} --project-name=music-player
          else
            npx wrangler pages deployment rollback --project-name=music-player
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  rollback-worker:
    name: Rollback Worker
    if: ${{ github.event.inputs.target == 'worker' || github.event.inputs.target == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Rollback Worker
        run: |
          if [ -n "${{ github.event.inputs.deployment_id }}" ]; then
            npx wrangler rollback --message="Rollback to ${{ github.event.inputs.deployment_id }}"
          else
            npx wrangler rollback
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
